<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="hero">
    <div class="hero__inner">
      {% assign name_parts = site.title | split: "—" %}
      <h1 class="hero__title">{{ name_parts[0] | strip }}</h1>
      <p class="hero__subtitle">{{ name_parts[1] | strip }}</p>
      <p class="hero__tagline">{{ site.description }}</p>
      <nav class="hero__links">
        <a href="https://github.com/noamshabtai">GitHub</a>
        <a href="https://www.linkedin.com/in/noam-shabtai-80836717/">LinkedIn</a>
        <a href="#contact">Email</a>
      </nav>
    </div>
  </header>

  <main class="content">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>Built with test-driven discipline. &copy; {{ 'now' | date: "%Y" }} Noam Shabtai</p>
  </footer>
</body>
</html>
